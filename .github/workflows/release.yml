name: Publish Release to Public Repository

on:
  release:
    types: [published]  # Déclenche l'action lorsqu'une release est publiée

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Collect the specific release file
        run: |
          mkdir release
          cp ./n02/Naxe\ Pilotage.exe release/  # Copier uniquement le fichier Naxe Pilotage.exe

      - name: Push release to public repository
        env:
          GITHUB_TOKEN: ${{ secrets.PUBLIC_REPO_TOKEN }}
        run: |
          git clone https://${{ secrets.PUBLIC_REPO_TOKEN }}@github.com/Naxecorp/n-pil.git
          cd n-pil

          # Configurer l'identité Git (nom et e-mail)
          git config user.email "contact@naxe.fr"  # Utilisez un e-mail valide
          git config user.name "Naxe Bot"  # Utilisez un nom descriptif

          # Copier le fichier dans le repo public
          cp ../release/Naxe\ Pilotage.exe .

          # Commit et push des fichiers
          git add .
          git commit -m "Release ${{ github.event.release.tag_name }}"
          git push origin main

      - name: Create release on public repository (with specific file)
        env:
          GH_TOKEN: ${{ secrets.PUBLIC_REPO_TOKEN }}
        run: |
          # Créer la release et attacher uniquement le fichier Naxe Pilotage.exe
          gh release create ${{ github.event.release.tag_name }} \
            --repo naxecorp/n-pil \
            --title "${{ github.event.release.name }}" \
            --notes "${{ github.event.release.body }}" \
            ./release/Naxe\ Pilotage.exe
