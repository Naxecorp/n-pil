name: Publish Release to Public Repository

on:
  release:
    types: [published]  # Déclenche l'action lorsqu'une release est publiée

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Archive the release files
        run: |
          mkdir release
          cp -r ./n02/* release/  # Remplacez par le chemin de vos fichiers
          tar -czvf release-v${{ github.event.release.tag_name }}.tar.gz -C release .

      - name: Push release to public repository
        env:
          GITHUB_TOKEN: ${{ secrets.PUBLIC_REPO_TOKEN }}
        run: |
          git clone https://${{ secrets.PUBLIC_REPO_TOKEN }}@github.com/Naxecorp/n-pil.git
          cd n-pil

          # Configurer l'identité Git (nom et e-mail)
          git config user.email "contact@naxe.fr"  # Utilisez un e-mail valide
          git config user.name "Naxe Bot"  # Utilisez un nom descriptif

          # Copier l'archive dans le repo public
          cp ../release-v${{ github.event.release.tag_name }}.tar.gz .

          # Commit et push des fichiers
          git add .
          git commit -m "Release ${{ github.event.release.tag_name }}"
          git push origin main

      - name: Create release on public repository
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # Jeton d'authentification pour GitHub CLI
        run: |
          gh release create ${{ github.event.release.tag_name }} \
            --repo naxecorp/n-pil \
            --title "${{ github.event.release.name }}" \
            --notes "${{ github.event.release.body }}" \
            release-v${{ github.event.release.tag_name }}.tar.gz

      - name: Delete source archives from the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Récupérer l'ID de la release
          RELEASE_ID=$(gh api repos/naxecorp/n-pil/releases --jq '.[] | select(.tag_name == "${{ github.event.release.tag_name }}") | .id')

          # Récupérer les ID des assets à supprimer (les fichiers zip et tar.gz)
          ASSET_IDS=$(gh api repos/naxecorp/n-pil/releases/$RELEASE_ID/assets --jq '.[] | select(.name | endswith(".zip") or endswith(".tar.gz")) | .id')

          # Supprimer chaque asset automatiquement généré
          for ASSET_ID in $ASSET_IDS; do
            gh api --method DELETE repos/naxecorp/n-pil/releases/assets/$ASSET_ID
          done
